<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="javascript movie feature app">
    <title>Movie App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
       <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <h2 class="text-center mb-4 text-light ">Movie Explorers</h2>

        <div class="d-flex justify-content-center gap-2 mb-4">
            <button class="btn btn-outline-primary fw-bold" onclick="showAll()" >Show All</button>
            <button class="btn btn-outline-primary fw-bold" onclick="filterAction()">Action</button>
            <button class="btn btn-outline-primary fw-bold" onclick="findInception()">Inception</button>
            <button class="btn btn-outline-primary fw-bold" onclick="filterThriller()">Thriller</button>
            <button class="btn btn-outline-primary fw-bold" onclick="filterAfter2012()">Movies After 2012</button>

        </div>

        
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6 d-flex gap-2">
                <input type="text" id="searchInput" class="form-control">
                <button class="btn btn-dark" onclick="searchMovie()">Search</button>
                
            </div>

        </div>

        <!-- Movie List -->
         <div id="movie-container" class="row g-3"></div>
         <div id="movieContainer"></div>
    </div>
    

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
